apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: ${CLICKHOUSE_USER}
      defaultDatabase: realtime
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
