name: 'crypto_platform'
version: '0.1.0'
config-version: 2

profile: 'crypto_platform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  crypto_platform:
    staging:
      +materialized: view
      +schema: staging     # → iceberg.staging.*
    marts:
      +materialized: table
      +schema: gold        # → iceberg.gold.*
      +file_format: iceberg
