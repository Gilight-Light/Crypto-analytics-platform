name: crypto-analytics-platform

x-common-env: &common-env
  TZ: UTC

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [platform-net]

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: minio
    restart: unless-stopped
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [platform-net]

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKETS: ${MINIO_BUCKET_BRONZE} ${MINIO_BUCKET_SILVER} ${MINIO_BUCKET_GOLD} ${MINIO_BUCKET_CHECKPOINTS} ${MINIO_BUCKET_WAREHOUSE}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for b in $$BUCKETS; do
          mc mb --ignore-existing "local/$$b"
          echo "  ready: $$b"
        done
        echo "MinIO buckets provisioned."
    restart: "no"
    networks: [platform-net]

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      <<: *common-env
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "24"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 30s
      retries: 15
      start_period: 60s
    networks: [platform-net]

  hive-metastore:
    build:
      context: ./hive-metastore
      dockerfile: Dockerfile
    image: crypto-platform/hive-metastore:4.0.1
    container_name: hive-metastore
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      <<: *common-env
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${HIVE_METASTORE_DB}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
    volumes:
      - ./hive-metastore/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks: [platform-net]

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: kafka-init
    profiles: ["streaming"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -eu
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic ${KAFKA_TOPIC_RAW_TRADES} \
          --partitions 3 \
          --replication-factor 1
        echo "Topics now present:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    environment:
      KAFKA_TOPIC_RAW_TRADES: ${KAFKA_TOPIC_RAW_TRADES}
    networks: [platform-net]

  binance-producer:
    build:
      context: ./producers/binance_ws_producer
      dockerfile: Dockerfile
    image: crypto-platform/binance-producer:latest
    container_name: binance-producer
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW_TRADES: ${KAFKA_TOPIC_RAW_TRADES}
      BINANCE_SYMBOLS: ${BINANCE_SYMBOLS}
      BINANCE_WS_BASE: wss://stream.binance.com:9443
      PRODUCER_MIN_INTERVAL_SEC: ${PRODUCER_MIN_INTERVAL_SEC:-5}
      LOG_LEVEL: INFO
    networks: [platform-net]

  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    image: crypto-platform/spark:3.5.3
    container_name: spark-master
    profiles: ["streaming", "batch"]
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark_jobs:/opt/spark_jobs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [platform-net]

  spark-worker:
    image: crypto-platform/spark:3.5.3
    container_name: spark-worker
    profiles: ["streaming", "batch"]
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark_jobs:/opt/spark_jobs:ro
    networks: [platform-net]

  spark-streaming-bronze:
    image: crypto-platform/spark:3.5.3
    container_name: spark-streaming-bronze
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      spark-worker:
        condition: service_started
      kafka:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    environment:
      <<: *common-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW_TRADES: ${KAFKA_TOPIC_RAW_TRADES}
      BRONZE_TRADES_CHECKPOINT: s3a://checkpoints/bronze_trades/
      BRONZE_TRADES_TABLE: iceberg.bronze.trades
      MICROBATCH_INTERVAL_SECS: "30"
      STARTING_OFFSETS: earliest
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --deploy-mode
      - client
      - --conf
      - spark.driver.host=spark-streaming-bronze
      - --conf
      - spark.cores.max=1
      - /opt/spark_jobs/streaming/trades_to_iceberg.py
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark_jobs:/opt/spark_jobs:ro
    networks: [platform-net]

  spark-streaming-clickhouse:
    image: crypto-platform/spark:3.5.3
    container_name: spark-streaming-clickhouse
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      spark-worker:
        condition: service_started
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW_TRADES: ${KAFKA_TOPIC_RAW_TRADES}
      CLICKHOUSE_TRADES_CHECKPOINT: s3a://checkpoints/clickhouse_trades/
      CLICKHOUSE_JDBC_URL: jdbc:clickhouse://clickhouse:8123/realtime
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_TRADES_TABLE: realtime.trades
      MICROBATCH_INTERVAL_SECS: "10"
      STARTING_OFFSETS: latest
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --deploy-mode
      - client
      - --conf
      - spark.driver.host=spark-streaming-clickhouse
      - --conf
      - spark.cores.max=1
      - /opt/spark_jobs/streaming/trades_to_clickhouse.py
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark_jobs:/opt/spark_jobs:ro
    networks: [platform-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    profiles: ["streaming"]
    restart: unless-stopped
    environment:
      <<: *common-env
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [platform-net]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    profiles: ["streaming"]
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [platform-net]

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: crypto-platform/airflow:2.10.3
    container_name: airflow-init
    profiles: ["batch"]
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - /entrypoint airflow version
    environment: &airflow-env
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      BINANCE_SYMBOLS: ${BINANCE_SYMBOLS}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_BRONZE: ${MINIO_BUCKET_BRONZE}
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./spark_jobs:/opt/spark_jobs:ro
      - airflow_logs:/opt/airflow/logs
    networks: [platform-net]

  airflow-scheduler:
    image: crypto-platform/airflow:2.10.3
    container_name: airflow-scheduler
    profiles: ["batch"]
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./spark_jobs:/opt/spark_jobs:ro
      - airflow_logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [platform-net]

  airflow-webserver:
    image: crypto-platform/airflow:2.10.3
    container_name: airflow-webserver
    profiles: ["batch"]
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    environment: *airflow-env
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./spark_jobs:/opt/spark_jobs:ro
      - airflow_logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [platform-net]

  trino:
    image: trinodb/trino:464
    container_name: trino
    profiles: ["serving"]
    depends_on:
      hive-metastore:
        condition: service_healthy
    ports:
      - "8082:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
      - ./trino/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/config.properties:/etc/trino/config.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [platform-net]

  superset-init:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: crypto-platform/superset:4.0.2
    container_name: superset-init
    profiles: ["serving"]
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        superset db upgrade
        superset fab create-admin \
            --username "$$ADMIN_USERNAME" \
            --firstname Admin --lastname User \
            --email admin@local \
            --password "$$ADMIN_PASSWORD" || true
        superset init
    environment: &superset-env
      <<: *common-env
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    restart: "no"
    networks: [platform-net]

  superset:
    image: crypto-platform/superset:4.0.2
    container_name: superset
    profiles: ["serving"]
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment: *superset-env
    ports:
      - "8089:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks: [platform-net]

networks:
  platform-net:
    name: platform-net
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  clickhouse_data:
  grafana_data:
  airflow_logs:
